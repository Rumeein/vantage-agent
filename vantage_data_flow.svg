<svg viewBox="0 0 860 660" xmlns="http://www.w3.org/2000/svg" role="img" font-family="system-ui, sans-serif">
  <title>Vantage Data Access Flow</title>
  <defs>
    <marker id="a" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3 z" fill="#4b5563"/></marker>
    <marker id="ab" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3 z" fill="#3b82f6"/></marker>
    <marker id="aa" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3 z" fill="#f59e0b"/></marker>
    <marker id="ag" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3 z" fill="#10b981"/></marker>
    <marker id="ar" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3 z" fill="#ef4444"/></marker>
    <marker id="ap" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3 z" fill="#8b5cf6"/></marker>
  </defs>

  <rect width="860" height="660" fill="#0f1117"/>

  <!-- ══ VANTAGE AGENT (centre) ══ -->
  <rect x="300" y="270" width="260" height="100" rx="8" fill="#1a1f2e" stroke="#8b5cf6" stroke-width="2.5"/>
  <text x="430" y="296" text-anchor="middle" font-size="13" font-weight="700" fill="#8b5cf6">Vantage Agent</text>
  <text x="430" y="312" text-anchor="middle" font-size="9" fill="#6b7280">Python · runs locally or on schedule</text>
  <line x1="315" y1="320" x2="545" y2="320" stroke="#2a2d3a" stroke-width="1"/>
  <text x="430" y="335" text-anchor="middle" font-size="9" fill="#6b7280">reads data → analyses → generates</text>
  <text x="430" y="349" text-anchor="middle" font-size="9" fill="#6b7280">insights · experiments · recommendations</text>
  <text x="430" y="362" text-anchor="middle" font-size="9" fill="#8b5cf6">writes back → Firestore (insights, tasks)</text>

  <!-- ══ LEFT SIDE: FIRESTORE — 6-month rolling ══ -->
  <text x="20" y="22" font-size="9" fill="#4b5563" letter-spacing="1.5" font-weight="700">6-MONTH ROLLING WINDOW  —  Firestore (no auth needed)</text>

  <!-- FK monthly -->
  <rect x="20" y="32" width="240" height="72" rx="7" fill="#1a1f2e" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="140" y="52" text-anchor="middle" font-size="11" font-weight="700" fill="#f59e0b">rumee_fk_daily/YYYY_MM</text>
  <text x="140" y="67" text-anchor="middle" font-size="9" fill="#6b7280">7 monthly docs · ≤256 KB each</text>
  <text x="140" y="81" text-anchor="middle" font-size="9" fill="#6b7280">views · clicks · sales · revenue · CTR</text>
  <text x="140" y="95" text-anchor="middle" font-size="9" fill="#f59e0b">Flipkart — per SKU per day</text>

  <!-- ME monthly -->
  <rect x="20" y="120" width="240" height="72" rx="7" fill="#1a1f2e" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="140" y="140" text-anchor="middle" font-size="11" font-weight="700" fill="#8b5cf6">rumee_me_daily/YYYY_MM</text>
  <text x="140" y="155" text-anchor="middle" font-size="9" fill="#6b7280">7 monthly docs · ≤126 KB each</text>
  <text x="140" y="169" text-anchor="middle" font-size="9" fill="#6b7280">orders · GMV · RTO · returns</text>
  <text x="140" y="183" text-anchor="middle" font-size="9" fill="#8b5cf6">Meesho — per SKU per day</text>

  <!-- Amazon monthly (future) -->
  <rect x="20" y="208" width="240" height="58" rx="7" fill="#1a1f2e" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4 2"/>
  <text x="140" y="228" text-anchor="middle" font-size="11" font-weight="700" fill="#ef4444">rumee_az_daily/YYYY_MM</text>
  <text x="140" y="244" text-anchor="middle" font-size="9" fill="#6b7280">future — SP-API not yet built</text>
  <text x="140" y="258" text-anchor="middle" font-size="9" fill="#ef4444">Amazon — orders · revenue · returns</text>

  <!-- Summary -->
  <rect x="20" y="282" width="240" height="58" rx="7" fill="#1a1f2e" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="140" y="302" text-anchor="middle" font-size="11" font-weight="700" fill="#f59e0b">rumee_db/summary</text>
  <text x="140" y="317" text-anchor="middle" font-size="9" fill="#6b7280">monthly aggregates · SKU metrics</text>
  <text x="140" y="331" text-anchor="middle" font-size="9" fill="#6b7280">FK + ME · 120 KB · full replace daily</text>

  <!-- Keywords -->
  <rect x="20" y="356" width="240" height="46" rx="7" fill="#1a1f2e" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="140" y="375" text-anchor="middle" font-size="11" font-weight="700" fill="#f59e0b">rumee_keywords/YYYY_MM</text>
  <text x="140" y="391" text-anchor="middle" font-size="9" fill="#6b7280">keyword · views · impression % · per SKU</text>

  <!-- Arrows: left boxes → Vantage -->
  <line x1="260" y1="68" x2="298" y2="300" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#aa)"/>
  <line x1="260" y1="156" x2="298" y2="305" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#ap)"/>
  <line x1="260" y1="237" x2="298" y2="310" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4 2" marker-end="url(#ar)"/>
  <line x1="260" y1="311" x2="300" y2="315" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#aa)"/>
  <line x1="260" y1="379" x2="300" y2="340" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#aa)"/>

  <!-- Access method label -->
  <text x="140" y="418" text-anchor="middle" font-size="8" fill="#4b5563">Firestore REST API  or  firebase-admin SDK</text>
  <text x="140" y="430" text-anchor="middle" font-size="8" fill="#4b5563">public API key · no PAT needed · safe in Python</text>

  <!-- ══ RIGHT SIDE: ALL-TIME + INSIGHTS ══ -->
  <text x="640" y="22" font-size="9" fill="#4b5563" letter-spacing="1.5" font-weight="700">ALL-TIME + WRITE-BACK</text>

  <!-- rumee-data all-time -->
  <rect x="630" y="32" width="210" height="110" rx="7" fill="#1a1f2e" stroke="#10b981" stroke-width="1.5"/>
  <text x="735" y="52" text-anchor="middle" font-size="11" font-weight="700" fill="#10b981">rumee-data (private repo)</text>
  <text x="735" y="67" text-anchor="middle" font-size="9" fill="#6b7280">full history · Dec 2025 → forever</text>
  <line x1="645" y1="74" x2="830" y2="74" stroke="#2a2d3a" stroke-width="1"/>
  <text x="645" y="88" font-size="9" fill="#6b7280">rumee_db_daily.csv</text>
  <text x="645" y="101" font-size="9" fill="#6b7280">rumee_db_summary.csv</text>
  <text x="645" y="114" font-size="9" fill="#6b7280">rumee_db_keywords.csv</text>
  <text x="645" y="129" font-size="9" fill="#10b981">accessed via GitHub API + PAT</text>

  <!-- PAT note -->
  <rect x="630" y="150" width="210" height="30" rx="4" fill="#0d1f17" stroke="#10b981" stroke-width="1"/>
  <text x="735" y="163" text-anchor="middle" font-size="9" fill="#10b981">PAT stored in rumee_secrets.py</text>
  <text x="735" y="175" text-anchor="middle" font-size="8" fill="#6b7280">gitignored · safe · Python only</text>

  <!-- Firestore alltime -->
  <rect x="630" y="196" width="210" height="58" rx="7" fill="#1a1f2e" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="735" y="216" text-anchor="middle" font-size="11" font-weight="700" fill="#f59e0b">rumee_db/alltime</text>
  <text x="735" y="231" text-anchor="middle" font-size="9" fill="#6b7280">on-demand snapshot · full history</text>
  <text x="735" y="245" text-anchor="middle" font-size="9" fill="#6b7280">FK + ME all-time in one doc</text>

  <!-- Insights read -->
  <rect x="630" y="270" width="210" height="58" rx="7" fill="#1a1f2e" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="735" y="290" text-anchor="middle" font-size="11" font-weight="700" fill="#8b5cf6">rumee_insights</text>
  <text x="735" y="305" text-anchor="middle" font-size="9" fill="#6b7280">reads existing insights</text>
  <text x="735" y="319" text-anchor="middle" font-size="9" fill="#8b5cf6">writes new insights back</text>

  <!-- Tasks write -->
  <rect x="630" y="344" width="210" height="58" rx="7" fill="#1a1f2e" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="735" y="364" text-anchor="middle" font-size="11" font-weight="700" fill="#8b5cf6">rumee_tasks</text>
  <text x="735" y="379" text-anchor="middle" font-size="9" fill="#6b7280">reads pending tasks</text>
  <text x="735" y="393" text-anchor="middle" font-size="9" fill="#8b5cf6">marks done · writes new tasks</text>

  <!-- Arrows: Vantage → right boxes -->
  <line x1="560" y1="295" x2="628" y2="90" stroke="#10b981" stroke-width="1.5" marker-end="url(#ag)"/>
  <line x1="560" y1="300" x2="628" y2="225" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#aa)"/>
  <line x1="560" y1="315" x2="628" y2="299" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#ap)"/>
  <line x1="628" y1="305" x2="562" y2="320" stroke="#8b5cf6" stroke-width="1" stroke-dasharray="3 2" marker-end="url(#ap)"/>
  <line x1="560" y1="330" x2="628" y2="373" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#ap)"/>
  <line x1="628" y1="380" x2="562" y2="335" stroke="#8b5cf6" stroke-width="1" stroke-dasharray="3 2" marker-end="url(#ap)"/>

  <!-- ══ TIMELINE BAR ══ -->
  <text x="20" y="462" font-size="9" fill="#4b5563" letter-spacing="1.5" font-weight="700">WHAT VANTAGE SEES — BY TIME HORIZON</text>
  <rect x="20" y="472" width="820" height="60" rx="7" fill="#161925" stroke="#2a2d3a" stroke-width="1"/>
  <line x1="50" y1="502" x2="820" y2="502" stroke="#2a2d3a" stroke-width="2"/>
  <text x="44" y="498" font-size="9" fill="#6b7280">Past</text>
  <text x="800" y="498" font-size="9" fill="#6b7280">Now</text>

  <rect x="56" y="490" width="240" height="10" rx="3" fill="#10b981" opacity="0.8"/>
  <text x="176" y="486" text-anchor="middle" font-size="8" fill="#10b981">rumee-data — full history via PAT</text>
  <text x="176" y="522" text-anchor="middle" font-size="8" fill="#6b7280">all FK + ME data ever · trend analysis</text>

  <rect x="296" y="490" width="340" height="10" rx="3" fill="#f59e0b" opacity="0.8"/>
  <text x="466" y="486" text-anchor="middle" font-size="8" fill="#f59e0b">Firestore monthly docs — 6-month rolling</text>
  <text x="466" y="522" text-anchor="middle" font-size="8" fill="#6b7280">detailed daily per-SKU · charts · anomalies</text>

  <rect x="636" y="488" width="142" height="14" rx="3" fill="#3b82f6" opacity="0.9"/>
  <text x="707" y="486" text-anchor="middle" font-size="8" fill="#3b82f6">current month</text>
  <text x="707" y="522" text-anchor="middle" font-size="8" fill="#6b7280">freshest data · daily insights</text>

  <line x1="56" y1="483" x2="56" y2="512" stroke="#10b981" stroke-width="1" stroke-dasharray="2 2"/>
  <line x1="296" y1="483" x2="296" y2="512" stroke="#f59e0b" stroke-width="1" stroke-dasharray="2 2"/>
  <line x1="636" y1="481" x2="636" y2="514" stroke="#3b82f6" stroke-width="1" stroke-dasharray="2 2"/>

  <!-- ══ LEGEND ══ -->
  <rect x="20" y="552" width="820" height="88" rx="7" fill="#161925" stroke="#2a2d3a" stroke-width="1"/>
  <text x="36" y="570" font-size="9" fill="#4b5563" font-weight="700" letter-spacing="1">ACCESS METHOD BY DATA TYPE</text>

  <rect x="36" y="578" width="8" height="8" rx="1" fill="#f59e0b"/>
  <text x="50" y="587" font-size="9" fill="#9ca3af">FK daily (6-month)  →  Firestore rumee_fk_daily/YYYY_MM  ·  no auth  ·  instant</text>

  <rect x="36" y="594" width="8" height="8" rx="1" fill="#8b5cf6"/>
  <text x="50" y="603" font-size="9" fill="#9ca3af">ME daily (6-month)  →  Firestore rumee_me_daily/YYYY_MM  ·  no auth  ·  instant</text>

  <rect x="36" y="610" width="8" height="8" rx="1" fill="#10b981"/>
  <text x="50" y="619" font-size="9" fill="#9ca3af">FK + ME all-time  →  rumee-data private repo  ·  GitHub API  ·  PAT in rumee_secrets.py</text>

  <rect x="440" y="578" width="8" height="8" rx="1" fill="#ef4444"/>
  <text x="454" y="587" font-size="9" fill="#9ca3af">Amazon (future)  →  Firestore only  ·  no PAT  ·  SP-API compliance</text>

  <rect x="440" y="594" width="8" height="8" rx="1" fill="#8b5cf6"/>
  <text x="454" y="603" font-size="9" fill="#9ca3af">Insights + Tasks  →  Firestore  ·  read + write  ·  firebase-admin SDK</text>

  <text x="440" y="622" font-size="9" fill="#4b5563">PAT is safe in Python (stored in gitignored file) — unlike browser HTML where it would be public</text>
</svg>
